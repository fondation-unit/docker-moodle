services:
  moodle:
    build: ./moodle
    container_name: moodle
    working_dir: /var/www/html
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./moodle/config.php:/var/www/html/config.php
      - moodle_data:/var/moodledata
      - moodle_src:/var/www/html
    expose:
      - "9000"
    networks:
      - web
      - backend
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  moodle-web:
    image: nginx:alpine
    container_name: moodle-web
    volumes:
      - ./nginx/moodle.conf:/etc/nginx/conf.d/default.conf
      - moodle_src:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      - moodle
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${APP_NAME}.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.${APP_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}.tls.certresolver=myresolver"
      - "traefik.http.services.${APP_NAME}.loadbalancer.server.port=80"
      # www
      - "traefik.http.routers.${APP_NAME}-www.service=noop@internal"
      - "traefik.http.routers.${APP_NAME}-www.rule=Host(`www.${DOMAIN_NAME}`)"
      - "traefik.http.routers.${APP_NAME}-www.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}-www.tls.certresolver=myresolver"
      - "traefik.http.routers.${APP_NAME}-www.middlewares=redirect-www@file"
      # Block scanners
      - "traefik.http.middlewares.block-scan.errors.status=403"
      - "traefik.http.middlewares.block-scan.errors.service=noop@internal"
      # Middlewares
      - "traefik.http.routers.${APP_NAME}.middlewares=block-scan@docker,compress\
        @docker,security-headers@file,anubis@file"
      # Gzip compression
      - "traefik.http.middlewares.compress.compress=true"
      # Timeouts
      - "traefik.http.serversTransports.${APP_NAME}-transport.forwardingTimeout\
        s.dialTimeout=60s"
      - "traefik.http.serversTransports.${APP_NAME}-transport.forwardingTimeout\
        s.responseHeaderTimeout=300s"
      - "traefik.http.serversTransports.${APP_NAME}-transport.forwardingTimeout\
        s.idleConnTimeout=300s"
    networks:
      - web

  db:
    image: mariadb:12.3
    container_name: db
    expose:
      - "3306"
    restart: always
    volumes:
      - db_data:/var/lib/mysql
      - ./db/my.cnf:/etc/mysql/my.cnf
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--innodb-read-only-compressed=OFF"
    env_file: .env
    environment:
      - TZ=Europe/Paris
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  redis:
    image: redis:8.8
    container_name: redis
    restart: always
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    expose:
      - "6379"
    networks:
      - backend

  traefik:
    image: traefik:v3.6
    container_name: traefik
    depends_on:
      - anubis
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375" # Point to the proxy instead of the socket
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # Resolver
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${TRAEFIK_ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      # Providers
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
    labels:
      # Security headers
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains\
        =true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=t\
        rue"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      # Cache static assets
      - "traefik.http.middlewares.cache-headers.headers.customresponseheaders.C\
        ache-Control=public, max-age=31536000"
      # Anubis middleware
      - "traefik.http.middlewares.anubis.forwardauth.address=http://anubis:8080\
        /.within.website/x/cmd/anubis/api/check"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./traefik/acme.json:/letsencrypt/acme.json"
      - "./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro"
    networks:
      - web
      - socket

  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1 # Traefik needs to list containers
      SERVICES: 1 # Needed for Docker Swarm (safe to keep)
      NETWORKS: 1 # Needed to discover container networks
      TASKS: 1 # Needed for Docker Swarm tasks
      # Everything else defaults to 0 (denied)
      POST: 0 # Explicitly deny write operations
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket # Isolated network, NOT on 'web'

  anubis:
    image: ghcr.io/techarohq/anubis:main
    environment:
      - BIND=:8080 # where to listen for Traefik
      - "TARGET= " # do redirect - ensure there is a space after '='
      # Specifies which domains Anubis is allowed to redirect to.
      - REDIRECT_DOMAINS=${DOMAIN_NAME}
      # Should be the full external URL for Anubis (including scheme)
      - PUBLIC_URL=https://${ANUBIS_DOMAIN_NAME}
      # Should match your domain for proper cookie scoping
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.anubis.rule=Host(`${ANUBIS_DOMAIN_NAME}`)" # Only Matching Requests for this domain
      - "traefik.http.routers.anubis.entrypoints=websecure"
      - "traefik.http.services.anubis.loadbalancer.server.port=8080" # telling Traefik where to receive requests
      - "traefik.http.routers.anubis.service=anubis" # telling Traefik to use the above specified port
      - "traefik.http.routers.anubis.tls.certresolver=myresolver" # telling Traefik to resolve a cert for Anubis
    networks:
      - web

volumes:
  moodle_src:
    driver: local
  moodle_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MOODLE_DATA_PATH}/moodledata
  db_data:
    driver: local

networks:
  backend:
    internal: true
  socket:
    internal: true
  web:
    external: true
